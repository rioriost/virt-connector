name: VirtConnector
options:
  bundleIdPrefix: st.rio
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    CLANG_ENABLE_MODULES: YES
    ENABLE_HARDENED_RUNTIME: YES
targets:
  VirtConnector:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/VirtConnector
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: st.rio.virt-connector
        PRODUCT_NAME: VirtConnector
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: VirtConnector.entitlements
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: NO
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
